name: Test server

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-server-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libsndfile1 \
            libcairo2 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            fonts-liberation

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.11"

      - name: Sync server dependencies
        run: uv sync --package holy-moly-server

      - name: Run unit tests
        run: cd server && ../.venv/bin/python -m unittest discover -s tests -v

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --no-audit --no-fund

      - name: Build
        working-directory: frontend
        run: npm run build
