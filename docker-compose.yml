services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "8080:8080"
    environment:
      - HOLY_MOLY_HOST=0.0.0.0
      - HOLY_MOLY_PORT=8080
      - HF_HOME=/models
      - MARKER_TIMEOUT=600
      - MARKER_WORKERS=12
    volumes:
      - ./whisper-models:/models
